<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Appointment Prototype</title>
  <link rel="stylesheet" href="/static/styles.css?v=2">
</head>
<body>
  <header class="site-header">
    <div class="header-left">West Island Windows</div>
    <div class="header-right">
      <button id="back-home">Home</button>
    </div>
  </header>

  <main>
    <section class="login-main app-view">
      <div id="login-form-view" class="login-form">
        <h2>Log in</h2>

        <label for="login-username">Username</label>
        <input id="login-username" type="text" placeholder="username" autocomplete="username">

        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="password" autocomplete="current-password">

        <div class="login-actions">
          <button id="back-home-2" type="button">Cancel</button>
          <button id="login-submit" type="button">Log in</button>
        </div>
        <div id="login-error" class="error" hidden></div>
        <div class="hint" id="demo-hint">Demo: <strong>emp1 / pass</strong> &nbsp;|&nbsp; <strong>mgr1 / pass</strong></div>

        <div id="employee-no-signup" class="hint" style="color:#c0392b;background:#fdf2f2;border:1px solid #f5c6cb;padding:10px 14px;border-radius:6px;margin-top:12px;" hidden>
          Employee accounts are created by the manager only. Please contact your manager if you do not have credentials.
        </div>
      </div>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
