<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Home - Appointment Prototype</title>
  <link rel="stylesheet" href="/static/styles.css?v=2">
</head>
<body>
  <header class="site-header">
    <div class="header-left">West Island Windows</div>
    <div class="header-right">
      <span id="user-greeting" class="user-greeting" hidden></span>
      <button id="login-btn">Log in</button>
      <button id="logout-btn" hidden>Log out</button>
    </div>
  </header>

  <main>
    <section class="contact">
      <h1>West Island Windows</h1>
      <p>Phone: (438) 255-1095 · Email: westislandwindowcleaning@gmail.com</p>
      <p>Address: Montreal, Quebec</p>
    </section>

    <section class="services">
      <div class="service-card">
        <div class="service-box">
          <h3>Cleaning Windows</h3>
          <p>Professional window cleaning for homes and businesses.</p>
          <button class="service-box-btn" onclick="window.location.href='/login?role=customer'">Book Now</button>
        </div>
        <div class="service-image-small" id="service-img-1">
          <img src="/static/window.png?v=3" alt="Window cleaning" class="service-photo"/>
        </div>
      </div>

      <div class="service-card">
        <div class="service-box">
          <h3>Cleaning Gutters</h3>
          <p>Safe and thorough gutter cleaning and maintenance.</p>
          <button class="service-box-btn" onclick="window.location.href='/login?role=customer'">Book Now</button>
        </div>
        <div class="service-image-small" id="service-img-2">
          <img src="/static/Gutter.png?v=3" alt="Gutter cleaning" class="service-photo"/>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
